<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — Transparency Portal</title>
  <meta name="description" content="Sign in to the Transparency Portal." />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <header class="login-header">
    <div class="wrap">
      <p class="eyebrow">Transparency Portal</p>
      <h1>Sign in</h1>
      <p class="lede">Use your account to access inquiries and support.</p>
    </div>
  </header>

  <main id="main" class="wrap login-main">
    <section class="panel login-panel">
      <h2 class="login-panel-title">Account</h2>
      <p id="login-error" class="login-error" hidden role="alert">
        Sign-in failed. Check your username and password.
      </p>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="login-username">Username</label>
          <input
            type="text"
            id="login-username"
            name="username"
            required
            autocomplete="username"
            maxlength="128"
          />
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <input
            type="password"
            id="login-password"
            name="password"
            required
            autocomplete="current-password"
            maxlength="256"
          />
        </div>
        <button type="submit" class="btn primary login-submit">Sign in</button>
      </form>
      <p class="login-demo-hint">
        Demo account: <strong>TestUser</strong> / <strong>testing</strong>
      </p>
    </section>
  </main>

  <footer class="login-footer">
    <div class="wrap">
      <p>Transparency Portal — public transparency and support.</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/login.js" defer></script>
</body>
</html>
